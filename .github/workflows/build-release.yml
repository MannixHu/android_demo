name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > /tmp/release_notes.md << NOTES
          ## Counter App $VERSION

          ### Release Information
          - **Version**: $VERSION
          - **Build Date**: $(date '+%Y-%m-%d %H:%M:%S')
          - **Commit**: ${{ github.sha }}

          ### APK Files
          - **app-release.apk**: Production release
          - **app-debug.apk**: Debug build

          ### Features
          - Counter display with persistence
          - +1, -1, Reset buttons
          - Material Design 3 UI
          - Auto-update from GitHub releases

          ### Installation
          1. Download the APK file below
          2. Enable "Unknown sources" in Settings → Security
          3. Install the APK on your Android device
          NOTES

      - name: Create GitHub Release with APK Files
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.VERSION }}
          name: Counter App ${{ steps.version.outputs.VERSION }}
          body: "Android Counter App Release"
          artifacts: |
            app/build/outputs/apk/release/app-release.apk,
            app/build/outputs/apk/debug/app-debug.apk
          artifactContentType: application/vnd.android.package-archive
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Status Check
        run: |
          echo "✅ Release Build Successful!"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "APK Location: app/build/outputs/apk/"
          ls -lh app/build/outputs/apk/*/
