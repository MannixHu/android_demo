name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare APK Assets
        id: assets
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p dist

          RELEASE_APK="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          DEBUG_APK="$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' | head -n 1)"

          # Use release APK if available, otherwise fallback to debug APK
          if [ -n "$RELEASE_APK" ] && ! printf '%s' "$RELEASE_APK" | grep -qi 'unsigned'; then
            PRIMARY_APK="$RELEASE_APK"
            BUILD_TYPE="release"
          elif [ -n "$DEBUG_APK" ]; then
            PRIMARY_APK="$DEBUG_APK"
            BUILD_TYPE="debug"
          else
            echo "ERROR: No suitable APK found"
            exit 1
          fi

          ASSET_PATH="dist/counter-app-${VERSION}.apk"
          cp "$PRIMARY_APK" "$ASSET_PATH"

          echo "PRIMARY_APK=$ASSET_PATH" >> "$GITHUB_OUTPUT"
          echo "BUILD_TYPE=$BUILD_TYPE" >> "$GITHUB_OUTPUT"

          echo "Prepared APK (${BUILD_TYPE}):"
          ls -lh "$ASSET_PATH"

      - name: Create Release Notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD_TYPE="${{ steps.assets.outputs.BUILD_TYPE }}"
          APK_NAME="counter-app-${VERSION}.apk"

          cat > /tmp/release_notes.md << NOTES
          ## Counter App $VERSION

          ### Release Information
          - **Version**: $VERSION
          - **Build Type**: $BUILD_TYPE
          - **Build Date**: $(date '+%Y-%m-%d %H:%M:%S')

          ### Features
          - Counter display with persistence
          - +1, -1, Reset buttons
          - Material Design 3 UI

          ### Installation
          1. Download **$APK_NAME** below
          2. Enable "Unknown sources" in Settings → Security
          3. Install the APK on your Android device
          NOTES

      - name: Create Release and Upload APK
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          APK_FILE="${{ steps.assets.outputs.PRIMARY_APK }}"

          echo "Creating release $VERSION with APK..."

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "$APK_FILE" --clobber
          else
            gh release create "$VERSION" \
              --title "Counter App $VERSION" \
              --notes-file /tmp/release_notes.md \
              "$APK_FILE"
          fi

          echo "✅ Release created/updated with APK"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Status Check
        run: |
          echo "✅ Release Build Successful!"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Prepared release assets:"
          ls -lh dist
