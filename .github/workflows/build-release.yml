name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare APK Assets
        id: assets
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p dist

          RELEASE_APK="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          DEBUG_APK="$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' | head -n 1)"

          if [ -z "$RELEASE_APK" ]; then
            echo "ERROR: no release APK found"
            ls -la app/build/outputs/apk/release || true
            exit 1
          fi

          if [ -z "$DEBUG_APK" ]; then
            echo "ERROR: no debug APK found"
            ls -la app/build/outputs/apk/debug || true
            exit 1
          fi

          PRIMARY_ASSET="dist/counter-app-${VERSION}.apk"
          DEBUG_ASSET="dist/counter-app-debug-${VERSION}.apk"

          cp "$DEBUG_APK" "$DEBUG_ASSET"

          if printf '%s' "$RELEASE_APK" | grep -qi 'unsigned'; then
            cp "$DEBUG_APK" "$PRIMARY_ASSET"
            UNSIGNED_ASSET="dist/counter-app-release-unsigned-${VERSION}.apk"
            cp "$RELEASE_APK" "$UNSIGNED_ASSET"
            echo "PRIMARY_ASSET_NOTE=Primary installable APK (debug-signed fallback because the release variant is unsigned)." >> "$GITHUB_OUTPUT"
            echo "UNSIGNED_ASSET=$UNSIGNED_ASSET" >> "$GITHUB_OUTPUT"
          else
            cp "$RELEASE_APK" "$PRIMARY_ASSET"
            echo "PRIMARY_ASSET_NOTE=Primary installable APK (signed release build)." >> "$GITHUB_OUTPUT"
          fi

          echo "PRIMARY_ASSET=$PRIMARY_ASSET" >> "$GITHUB_OUTPUT"
          echo "DEBUG_ASSET=$DEBUG_ASSET" >> "$GITHUB_OUTPUT"

          echo "Prepared assets:"
          ls -lh dist

      - name: Create Release Notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PRIMARY_ASSET_NAME="$(basename "${{ steps.assets.outputs.PRIMARY_ASSET }}")"
          DEBUG_ASSET_NAME="$(basename "${{ steps.assets.outputs.DEBUG_ASSET }}")"
          PRIMARY_ASSET_NOTE="${{ steps.assets.outputs.PRIMARY_ASSET_NOTE }}"
          UNSIGNED_ASSET="${{ steps.assets.outputs.UNSIGNED_ASSET }}"

          UNSIGNED_LINE=""
          if [ -n "$UNSIGNED_ASSET" ]; then
            UNSIGNED_LINE="- **$(basename "$UNSIGNED_ASSET")**: Raw unsigned release variant (not directly installable)"
          fi

          cat > /tmp/release_notes.md << NOTES
          ## Counter App $VERSION

          ### Release Information
          - **Version**: $VERSION
          - **Build Date**: $(date '+%Y-%m-%d %H:%M:%S')
          - **Commit**: ${{ github.sha }}

          ### APK Files
          - **$PRIMARY_ASSET_NAME**: $PRIMARY_ASSET_NOTE
          - **$DEBUG_ASSET_NAME**: Raw debug build
          $UNSIGNED_LINE

          ### Features
          - Counter display with persistence
          - +1, -1, Reset buttons
          - Material Design 3 UI
          - Auto-update from GitHub releases

          ### Installation
          1. Download the APK file below
          2. Enable "Unknown sources" in Settings → Security
          3. Install the APK on your Android device
          NOTES

      - name: Create Release and Upload APKs
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          PRIMARY_ASSET="${{ steps.assets.outputs.PRIMARY_ASSET }}"
          DEBUG_ASSET="${{ steps.assets.outputs.DEBUG_ASSET }}"
          UNSIGNED_ASSET="${{ steps.assets.outputs.UNSIGNED_ASSET }}"

          ASSETS=("$PRIMARY_ASSET" "$DEBUG_ASSET")
          if [ -n "$UNSIGNED_ASSET" ]; then
            ASSETS+=("$UNSIGNED_ASSET")
          fi

          echo "Creating release $VERSION with APK files..."

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "${ASSETS[@]}" --clobber
          else
            gh release create "$VERSION" \
              --title "Counter App $VERSION" \
              --notes-file /tmp/release_notes.md \
              "${ASSETS[@]}"
          fi

          echo "✅ Release created/updated with APK files"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Status Check
        run: |
          echo "✅ Release Build Successful!"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Prepared release assets:"
          ls -lh dist
