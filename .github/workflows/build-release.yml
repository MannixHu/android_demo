name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > /tmp/release_notes.md << NOTES
          ## Counter App $VERSION

          ### Release Information
          - **Version**: $VERSION
          - **Build Date**: $(date '+%Y-%m-%d %H:%M:%S')
          - **Commit**: ${{ github.sha }}

          ### APK Files
          - **app-release.apk**: Production release
          - **app-debug.apk**: Debug build

          ### Features
          - Counter display with persistence
          - +1, -1, Reset buttons
          - Material Design 3 UI
          - Auto-update from GitHub releases

          ### Installation
          1. Download the APK file below
          2. Enable "Unknown sources" in Settings → Security
          3. Install the APK on your Android device
          NOTES

      - name: Debug: List APK files
        run: |
          echo "=== Checking APK output directory ==="
          find app/build/outputs -name "*.apk" -type f || echo "No APK files found"
          echo ""
          echo "=== Full directory structure ==="
          ls -la app/build/outputs/ || echo "outputs directory doesn't exist"

      - name: Create Release and Upload APKs
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Find APK files
          RELEASE_APK=$(find app/build/outputs -name "app-release.apk" -type f)
          DEBUG_APK=$(find app/build/outputs -name "app-debug.apk" -type f)

          if [ -z "$RELEASE_APK" ]; then
            echo "ERROR: app-release.apk not found!"
            exit 1
          fi

          if [ -z "$DEBUG_APK" ]; then
            echo "ERROR: app-debug.apk not found!"
            exit 1
          fi

          echo "Found APKs:"
          echo "  Release: $RELEASE_APK"
          echo "  Debug:   $DEBUG_APK"

          # Create release with gh CLI
          echo "Creating release $VERSION..."
          gh release create "$VERSION" \
            --title "Counter App $VERSION" \
            --notes "Android Counter App v$VERSION" \
            "$RELEASE_APK" \
            "$DEBUG_APK"

          echo "✅ Release created with APK files"

      - name: Build Status Check
        run: |
          echo "✅ Release Build Successful!"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "APK Location: app/build/outputs/apk/"
          ls -lh app/build/outputs/apk/*/
