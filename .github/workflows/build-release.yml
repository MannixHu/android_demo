name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > /tmp/release_notes.md << NOTES
          ## Counter App $VERSION

          ### Release Information
          - **Version**: $VERSION
          - **Build Date**: $(date '+%Y-%m-%d %H:%M:%S')
          - **Commit**: ${{ github.sha }}

          ### APK Files
          - **app-release.apk**: Production release
          - **app-debug.apk**: Debug build

          ### Features
          - Counter display with persistence
          - +1, -1, Reset buttons
          - Material Design 3 UI
          - Auto-update from GitHub releases

          ### Installation
          1. Download the APK file below
          2. Enable "Unknown sources" in Settings → Security
          3. Install the APK on your Android device
          NOTES

      - name: Create GitHub Release with APK Files
        run: python3 << 'PYTHON_EOF'
import requests
import json
import os

VERSION = "${{ steps.version.outputs.VERSION }}"
REPO = "${{ github.repository }}"
TOKEN = "${{ secrets.GITHUB_TOKEN }}"

api_url = f"https://api.github.com/repos/{REPO}/releases"
headers = {
    "Authorization": f"token {TOKEN}",
    "Accept": "application/vnd.github.v3+json"
}

# Create release
release_data = {
    "tag_name": VERSION,
    "name": f"Counter App {VERSION}",
    "body": "Android Counter App Release",
    "draft": False,
    "prerelease": False
}

print(f"Creating release {VERSION}...")
response = requests.post(api_url, json=release_data, headers=headers)

if response.status_code not in [201, 422]:  # 201 = created, 422 = already exists
    print(f"Failed to create release: {response.status_code}")
    print(response.json())
    exit(1)

release = response.json()
upload_url = release.get("upload_url", "").rstrip("}{?name,label}")

if not upload_url:
    print("No upload URL found")
    exit(1)

# Upload APK files
apk_files = [
    ("app/build/outputs/apk/release/app-release.apk", "app-release.apk"),
    ("app/build/outputs/apk/debug/app-debug.apk", "app-debug.apk")
]

for file_path, file_name in apk_files:
    if not os.path.exists(file_path):
        print(f"❌ File not found: {file_path}")
        continue

    print(f"Uploading {file_name}...")
    with open(file_path, "rb") as f:
        upload_headers = {
            "Authorization": f"token {TOKEN}",
            "Content-Type": "application/vnd.android.package-archive"
        }
        upload_response = requests.post(
            f"{upload_url}?name={file_name}",
            data=f,
            headers=upload_headers
        )
        if upload_response.status_code == 201:
            print(f"✅ Uploaded {file_name}")
        else:
            print(f"❌ Failed to upload {file_name}: {upload_response.status_code}")

print("✅ Release created with APK files")
PYTHON_EOF

      - name: Build Status Check
        run: |
          echo "✅ Release Build Successful!"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "APK Location: app/build/outputs/apk/"
          ls -lh app/build/outputs/apk/*/
